# Claude Code Guard — Pattern Definitions
# Format: category ::: action ::: regex ::: human-readable reason
# action: "block" = hard block, "ask" = ask-first
# regex: POSIX ERE, matched against normalized command (lowercase, expanded paths)
# Use [[:space:]] not \s for portability. \b works in macOS grep ERE.
# Lines starting with # are comments, blank lines are ignored
#
# IMPORTANT: Replace YOUR_USERNAME with your macOS username in all paths below.
# Example: /users/YOUR_USERNAME → /users/johndoe

# =============================================================================
# HARD BLOCK — Destructive File Operations
# =============================================================================

destructive_file ::: block ::: rm[[:space:]]+-rf[[:space:]]+/$ ::: Recursive delete on root directory
destructive_file ::: block ::: rm[[:space:]]+-rf[[:space:]]+/[[:space:]] ::: Recursive delete on root directory
destructive_file ::: block ::: rm[[:space:]]+-rf[[:space:]]+/users/YOUR_USERNAME(/[[:space:]]|/\*|/?$) ::: Recursive delete on home directory
destructive_file ::: block ::: rm[[:space:]]+-rf[[:space:]]+/\* ::: Recursive delete on root directory contents
destructive_file ::: block ::: rm[[:space:]]+-rf[[:space:]]+/(usr|etc|var|system|applications|library)\b ::: Recursive delete on system directory
destructive_file ::: block ::: \bmkfs\b ::: Disk formatting
destructive_file ::: block ::: \bdd[[:space:]]+.*\bof=/dev/ ::: Writing to block device with dd
destructive_file ::: block ::: \b(shred|wipe)[[:space:]] ::: Secure file erasure
destructive_file ::: block ::: >[[:space:]]*/dev/(sd|vd|xvd|nvme|hd|dm-)[a-z0-9] ::: Redirect to block device (excludes /dev/null, /dev/stderr, /dev/stdout)
destructive_file ::: block ::: find[[:space:]]+/[[:space:]].*-delete\b ::: Recursive find-delete on root
destructive_file ::: block ::: find[[:space:]]+/users/YOUR_USERNAME[[:space:]].*-delete\b ::: Recursive find-delete on home
destructive_file ::: block ::: find[[:space:]]+/[[:space:]].*-exec[[:space:]]+rm\b ::: Recursive find-exec-rm on root
destructive_file ::: block ::: find[[:space:]]+/users/YOUR_USERNAME[[:space:]].*-exec[[:space:]]+rm\b ::: Recursive find-exec-rm on home
destructive_file ::: block ::: \btruncate\b.*/(etc|usr|var|\.ssh|\.aws|\.gnupg)/ ::: Truncate system or sensitive files
destructive_file ::: block ::: \bln[[:space:]]+-[a-z]*s[a-z]*f?[[:space:]]+.*[[:space:]]+/(etc|usr)/ ::: Overwrite system symlinks
destructive_file ::: block ::: \bxargs[[:space:]]+rm\b ::: Piped mass deletion via xargs
destructive_file ::: block ::: \bmv[[:space:]]+/[[:space:]] ::: Moving root directory
destructive_file ::: block ::: \bmv[[:space:]]+/users/YOUR_USERNAME[[:space:]] ::: Moving home directory

# =============================================================================
# HARD BLOCK — Database Destructive (only when DB client present)
# =============================================================================

database ::: block ::: (psql|mysql|sqlite3|mongosh|mongo|redis-cli).*\bdrop[[:space:]]+(database|table)\b ::: Database/table destruction via CLI
database ::: block ::: (psql|mysql|sqlite3|mongosh|mongo|redis-cli).*\btruncate\b ::: Table truncation via CLI
database ::: block ::: \|[[:space:]]*(psql|mysql|sqlite3).*\bdrop[[:space:]]+(database|table)\b ::: Piped database/table destruction
database ::: block ::: \|[[:space:]]*(psql|mysql|sqlite3).*\btruncate\b ::: Piped table truncation
database ::: block ::: \bdrop[[:space:]]+(database|table)\b.*\|[[:space:]]*(psql|mysql|sqlite3)\b ::: SQL destruction piped to database CLI
database ::: block ::: \btruncate\b.*\|[[:space:]]*(psql|mysql|sqlite3)\b ::: SQL truncation piped to database CLI

# =============================================================================
# HARD BLOCK — Git Destructive
# Note: git push --force is handled by check_git_force_push() in guard.sh
# because ERE can't do negative lookahead for --force-with-lease exclusion
# =============================================================================

git_destructive ::: block ::: git[[:space:]]+push[[:space:]]+.*[[:space:]]+-f\b ::: Force push (short flag) overwrites remote history
git_destructive ::: block ::: git[[:space:]]+push[[:space:]]+\S+[[:space:]]+--delete\b ::: Delete remote branch
git_destructive ::: block ::: git[[:space:]]+push[[:space:]]+\S+[[:space:]]+:[^[:space:]] ::: Delete remote branch (colon syntax)

# =============================================================================
# HARD BLOCK — Container/Infra Destructive
# =============================================================================

container ::: block ::: docker[[:space:]]+system[[:space:]]+prune[[:space:]]+.*-a ::: Docker prune all unused resources
container ::: block ::: kubectl[[:space:]]+delete[[:space:]]+namespace\b ::: Delete entire Kubernetes namespace
container ::: block ::: kubectl[[:space:]]+delete\b.*[[:space:]]+--all\b ::: Mass Kubernetes resource deletion
container ::: block ::: kubectl[[:space:]]+(drain|cordon)\b ::: Kubernetes node disruption
container ::: block ::: terraform[[:space:]]+destroy\b ::: Terraform infrastructure teardown
container ::: block ::: helm[[:space:]]+uninstall\b ::: Helm release removal

# =============================================================================
# HARD BLOCK — Privilege Escalation
# =============================================================================

privilege ::: block ::: \bsudo\b ::: Privilege escalation via sudo
privilege ::: block ::: \bdoas\b ::: Privilege escalation via doas

# =============================================================================
# HARD BLOCK — Cron Destruction
# =============================================================================

cron ::: block ::: crontab[[:space:]]+-r\b ::: Remove all cron jobs

# =============================================================================
# ASK-FIRST — Git Risky Operations
# =============================================================================

git_risky ::: ask ::: git[[:space:]]+reset[[:space:]]+--hard\b ::: Discards all uncommitted changes
git_risky ::: ask ::: git[[:space:]]+clean[[:space:]]+-[a-z]*f ::: Deletes untracked files
# git branch -D is handled by case-sensitive pre-check in guard.sh (lowercase would lose the -D vs -d distinction)
git_risky ::: ask ::: git[[:space:]]+stash[[:space:]]+drop\b ::: Drops a stash entry
git_risky ::: ask ::: git[[:space:]]+stash[[:space:]]+clear\b ::: Drops all stash entries
git_risky ::: ask ::: git[[:space:]]+checkout[[:space:]]+--[[:space:]]+\.[[:space:]]*$ ::: Discards all working directory changes
git_risky ::: ask ::: git[[:space:]]+restore[[:space:]]+\.[[:space:]]*$ ::: Discards all working directory changes

# =============================================================================
# ASK-FIRST — System-Level Commands
# =============================================================================

system ::: ask ::: \b(shutdown|reboot|halt|poweroff)\b ::: System power control
system ::: ask ::: \bkill[[:space:]]+-9\b ::: Force kill process
system ::: ask ::: \b(killall|pkill)\b ::: Broad process termination
system ::: ask ::: \blaunchctl[[:space:]]+(load|unload|remove|bootout)\b ::: macOS service management
system ::: ask ::: \bdefaults[[:space:]]+write\b ::: macOS system preferences modification
system ::: ask ::: \bdiskutil[[:space:]]+(erase|partitiondisk|unmount)\b ::: Disk management operation
system ::: ask ::: \bcsrutil\b ::: SIP configuration

# =============================================================================
# ASK-FIRST — Dotfile/Config Modification
# =============================================================================

dotfile ::: ask ::: /users/YOUR_USERNAME/\.(zshrc|bashrc|zprofile|bash_profile)\b ::: Shell profile modification
dotfile ::: ask ::: /users/YOUR_USERNAME/\.gitconfig\b ::: Git config modification
dotfile ::: ask ::: /users/YOUR_USERNAME/\.(npmrc|pypirc)\b ::: Package manager config modification

# =============================================================================
# ASK-FIRST — Container Risky Operations
# =============================================================================

container_risky ::: ask ::: docker[[:space:]]+rm[[:space:]]+.*-f\b ::: Force-remove Docker container
container_risky ::: ask ::: docker[[:space:]]+rmi[[:space:]]+.*-f\b ::: Force-remove Docker image
container_risky ::: ask ::: brew[[:space:]]+(uninstall|remove)\b ::: Homebrew package removal

# =============================================================================
# WRITE/EDIT — Hard Block Protected Paths (used for edit/write tools)
# =============================================================================

protected_path ::: block ::: ^/(etc|usr|var)/ ::: System configuration path
protected_path ::: block ::: ^/users/YOUR_USERNAME/\.ssh/ ::: SSH keys and config
protected_path ::: block ::: ^/users/YOUR_USERNAME/\.aws/ ::: AWS credentials
protected_path ::: block ::: ^/users/YOUR_USERNAME/\.gnupg/ ::: GPG keys
protected_path ::: block ::: ^/users/YOUR_USERNAME/\.claude/settings\.json$ ::: Prevent self-modification of guard settings

# =============================================================================
# WRITE/EDIT — Ask-First Dotfiles (used for edit/write tools)
# =============================================================================

protected_dotfile ::: ask ::: ^/users/YOUR_USERNAME/\.(zshrc|bashrc|zprofile|bash_profile)$ ::: Shell profile modification via edit/write
protected_dotfile ::: ask ::: ^/users/YOUR_USERNAME/\.gitconfig$ ::: Git config modification via edit/write
